    <script>

      window.addEventListener("message", (event) => {

      var sCon = document.querySelector('#search-content')
      var sConS = getComputedStyle(sCon)
      var newsItem1 = document.querySelector('.news-item')
      var nItem1S = getComputedStyle(newsItem1)
      // search-content -> {height, nCols, nRows}

      const em = +nItem1S.getPropertyValue('font-size').slice(0,-2)

      style_sheet = document.styleSheets[document.styleSheets.length-1];
            CSS_Rules = style_sheet.cssRules;

            for (const rule of CSS_Rules) {
              if (rule.cssText.includes('.news-item {')) {
                var nItemStyleS = rule.cssText
              }
            }

				const emWidth = +nItemStyleS.split('width: ')[1].split('em')[0]

        const mHeightEm = +nItemStyleS.split('max-height: ')[1].split('em')[0]

      function sConHCR(nNewsI) {
        if (!nNewsI) {
          return 'no news items?'
        }

        var nItem1W = em*emWidth

        var sConW = +sConS.getPropertyValue('width').slice(0,-2)

        var gap = +sConS.getPropertyValue('gap').split('px')[0]

        nItem1W += gap
        var height = getComputedStyle(newsItem1).height
        height = height ? height : 'auto'

        var nCols = Math.floor(sConW/nItem1W)

        var nRows = Math.ceil(nNewsI/nCols)

        if (nRows === 1) {
          nCols = nNewsI
        }

        var height = height*nRows

        return {height, nCols, nRows}
      }
      //from https://dev.to/teaganga/understanding-debounce-in-javascript-a-guide-with-examples-3cm4

      var nNewsI = nNewsI_GOES_HERE

      const swapElements = (array, index1, index2) => {
        array[index1] = array.splice(index2, 1, array[index1])[0];
      };



      function debounce(func, wait) {
        let timeout;
        return function (...args) {
          clearTimeout(timeout);
          timeout = setTimeout(() => func.apply(this, args), wait);
        };
      }
      var nItems = Array.from(document.querySelectorAll('.news-item'))
      
      if (!newsItems) {
        var newsItems = Array.from(sCon.cloneNode(true).children)
      }



      var nItemsB = Array.from(document.querySelectorAll('.news-item'))

  

  
      updateGrid()


      function updateGrid() {
        var test = []
        let sConD = sConHCR(newsItems.length)
        sCon.style.height = sConD.height + 'px'
        sCon.replaceChildren(...gridify(sConD.nRows, sConD.nCols, newsItems))
        fixTabIndex()
      }

      function gridify(rows, cols, gridlings) {
        // var minLength = (rows - 1)*cols + 1 

        // if (gridlings.length < minLength) {
        //   throw('gridlings < minLength (fix "cols" & "rows")')
        // }

        // var maxLength = rows*cols

        // if (gridlings.length > maxLength) {
        //   throw('gridlings > minLength (fix "cols" & "rows")')
        // }

        const remainder = gridlings.length % cols

        if (remainder) {
          rows--
        }

        var columns = []

        for (let c = 1; c < cols+1; c++) {
          columns[c] = document.createElement('div')
          columns[c].className = "flex direction-column"
          const column = columns[c]
          for (let r = 1; r < rows+1; r++) {
            const gridIndex = (r - 1)*cols + c
            const elem = gridlings[gridIndex-1]
            if (elem) {
              //a element within newsItem
              try {
                elem.firstChild.children[1].tabIndex = gridIndex + 3
              }
              catch {
                console.log(elem)
              }

            }
            column.append(elem)
          }
        }

        if (remainder) {
          const offset = cols*rows
          const leftovers = gridlings.slice(-remainder)
          for (let c = 1; c < remainder+1; c++) {
            const column = columns[cols-remainder+c]
            const elem = leftovers[c-1]
            if (elem) {
              if (elem.firstChild) {
                elem.firstChild.children[1].tabIndex = offset + c + 3
              }
            }
            column.append(elem)
          }

        }
        return columns.slice(1)
      }

      const uGridD = debounce(updateGrid, 250);
      // Create a debounced version of updateGrid with a 250ms delay

      window.addEventListener('resize', uGridD);

          if (numCheckbox === numChecked + 1) {
