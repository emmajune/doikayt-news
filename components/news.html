<html lang="en-us">
	<head>
		<meta charset="utf-8">

		<title>Kelp</title>
    <link rel="icon" type="image/png" href="/favicon.png">

	<body>
    <form role="search" action="">
      <kelp-disclosure is-dropdown>
        <button type="button">Sources</button>
        <ul id="selection-container">
          <kelp-select-all id="ssa-container" target="#disclosed-sources input[type='checkbox']">
            <label for="super-select-all">
              <input type="checkbox" role="switch" id="super-select-all" maybe-super-checked/>select all
            </label>
          </kelp-select-all>
          <div id="disclosed-sources">
            SOURCES_GO_HERE
          </div>
        </ul>
      </kelp-disclosure>
      <input type="text" id="searchbar" class="inline-block" name="q" value="QUERY_GOES_HERE" autocomplete="off"></input>
      <button id="submit-button" class="inline-block">Go</button>
    </form>
		<main class="container-xl">
			<h1>The News:</h1>
      THE_NEWS_GOES_HERE

    <script type="module" src="https://cdn.jsdelivr.net/npm/kelpui@1/js/kelp.js"></script>
    <script>
      var selectionContainer = document.getElementById('selection-container')
      selectionContainer.addEventListener('change', (e)=>{
        if(e.target.checked){
          const isCheckbox = 'input[type="checkbox"]'
          const numCheckbox = document.querySelectorAll(isCheckbox).length
          const isChecked = 'input[type="checkbox"]:checked'
          const numChecked = document.querySelectorAll(isChecked).length
          if (numCheckbox === numChecked + 1) {
            var superSelectAll = document.getElementById('super-select-all')
            superSelectAll.checked = true;
          }
        }
      })
    </script>
